<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Analytics | AI Placement Predictor</title>
    <link rel="stylesheet" href="../static/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <nav class="nav-bar">
      <div class="nav-container">
        <a href="index.html" class="nav-logo">FutureHire AI</a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="result.html">Results</a>
          <a href="analysis.html">Analysis</a>
          <a href="action-plan.html">Action Plan</a>
          <a href="history.html">History</a>
          <a href="analytics.html" class="active">Analytics</a>
        </div>
      </div>
    </nav>

    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <main class="container">
      <header class="hero">
        <h1 class="gradient-text">Analytics Dashboard</h1>
        <p>Aggregate insights from all predictions stored in Firebase.</p>
      </header>

      <!-- Stats cards -->
      <div class="analytics-grid">
        <div class="glass-card analytics-card">
          <i class="fa-solid fa-users analytics-icon" style="color:#7c3aed;"></i>
          <div class="analytics-value" id="totalPredictions">—</div>
          <div class="analytics-label">Total Predictions</div>
        </div>
        <div class="glass-card analytics-card">
          <i class="fa-solid fa-chart-line analytics-icon" style="color:#38bdf8;"></i>
          <div class="analytics-value" id="avgProbability">—</div>
          <div class="analytics-label">Avg. Probability</div>
        </div>
        <div class="glass-card analytics-card">
          <i class="fa-solid fa-triangle-exclamation analytics-icon" style="color:#ef4444;"></i>
          <div class="analytics-value" id="highRiskCount">—</div>
          <div class="analytics-label">High Risk Students</div>
        </div>
      </div>

      <!-- Recent predictions -->
      <section class="glass-card breakdown-card" style="margin-top: 28px;">
        <h3><i class="fa-solid fa-clock-rotate-left"></i> Recent Predictions</h3>
        <div id="recentList" class="recent-list">
          <div class="history-loading">
            <div class="loading-spinner"></div>
            <p>Loading from Firebase...</p>
          </div>
        </div>
      </section>

      <div class="action-buttons">
        <a href="dashboard.html" class="secondary-btn">
          <i class="fa-solid fa-plus"></i> New Prediction
        </a>
        <a href="history.html" class="secondary-btn">
          <i class="fa-solid fa-database"></i> Full History
        </a>
      </div>
    </main>

    <script type="module" src="../static/script.js"></script>
  </body>
</html>
