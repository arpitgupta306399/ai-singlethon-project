<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>History | AI Placement Predictor</title>
    <link rel="stylesheet" href="../static/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <nav class="nav-bar">
      <div class="nav-container">
        <a href="index.html" class="nav-logo">FutureHire AI</a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="dashboard.html">Dashboard</a>
          <a href="result.html">Results</a>
          <a href="analysis.html">Analysis</a>
          <a href="action-plan.html">Action Plan</a>
          <a href="history.html" class="active">History</a>
          <a href="analytics.html">Analytics</a>
        </div>
      </div>
    </nav>

    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <main class="container">
      <header class="hero">
        <h1 class="gradient-text">Prediction History</h1>
        <p>All predictions saved to Firebase Firestore — updates in real-time.</p>
      </header>

      <div class="history-toolbar">
        <span id="historyCount" class="history-count-badge">
          <i class="fa-solid fa-database"></i> Loading...
        </span>
        <button id="clearAllBtn" class="danger-btn">
          <i class="fa-solid fa-trash"></i> Clear All
        </button>
      </div>

      <div id="historyContainer"></div>

      <div class="action-buttons" style="margin-top: 32px;">
        <a href="dashboard.html" class="secondary-btn">
          <i class="fa-solid fa-plus"></i> New Prediction
        </a>
        <a href="analytics.html" class="secondary-btn">
          <i class="fa-solid fa-chart-pie"></i> View Analytics
        </a>
      </div>
    </main>

    <script type="module" src="../static/script.js"></script>
  </body>
</html>
