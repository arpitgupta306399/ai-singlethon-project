<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Dashboard | AI Placement Predictor</title>
    <link rel="stylesheet" href="../static/style.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  </head>
  <body>
    <nav class="nav-bar">
      <div class="nav-container">
        <a href="index.html" class="nav-logo">FutureHire AI</a>
        <div class="nav-links">
          <a href="index.html">Home</a>
          <a href="dashboard.html" class="active">Dashboard</a>
          <a href="result.html">Results</a>
          <a href="analysis.html">Analysis</a>
          <a href="action-plan.html">Action Plan</a>
          <a href="history.html">History</a>
          <a href="analytics.html">Analytics</a>
        </div>
      </div>
    </nav>

    <div class="background-blobs">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>

    <main class="container">
      <header class="hero">
        <h1 class="gradient-text">Profile Dashboard</h1>
        <p>Enter your academic and skill details to get AI-powered placement predictions.</p>
      </header>

      <section class="glass-card form-container">
        <form id="predictionForm" novalidate>
          <div class="form-grid">
            <div class="input-group">
              <label><i class="fa-solid fa-user"></i> Full Name</label>
              <input type="text" id="name" placeholder="John Doe" required />
            </div>
            <div class="input-group">
              <label><i class="fa-solid fa-graduation-cap"></i> Marks (%)</label>
              <input type="number" id="marks" placeholder="85" min="0" max="100" required />
            </div>
            <div class="input-group">
              <label><i class="fa-solid fa-calendar-check"></i> Attendance (%)</label>
              <input type="number" id="attendance" placeholder="90" min="0" max="100" required />
            </div>
            <div class="input-group">
              <label><i class="fa-solid fa-circle-exclamation"></i> Active Backlogs</label>
              <input type="number" id="backlogs" placeholder="0" min="0" required />
            </div>
            <div class="input-group">
              <label><i class="fa-solid fa-folder-open"></i> Number of Projects</label>
              <input type="number" id="projects" placeholder="2" min="0" required />
            </div>
            <div class="input-group">
              <label><i class="fa-solid fa-code"></i> Number of Skills</label>
              <input type="number" id="skills_count" placeholder="5" min="0" required />
            </div>
          </div>

          <div class="input-group full-width" style="margin-bottom: 24px;">
            <label><i class="fa-solid fa-tags"></i> Skills List (comma-separated)</label>
            <input type="text" id="skills_list" placeholder="Python, React, SQL, DSA, AWS" />
          </div>

          <div id="formError" class="form-error hidden"></div>

          <button type="submit" id="predictBtn" class="primary-btn">
            <span>Analyze My Profile</span>
            <div class="loader" id="btnLoader"></div>
          </button>
        </form>
      </section>
    </main>

    <script type="module" src="../static/script.js"></script>
  </body>
</html>
